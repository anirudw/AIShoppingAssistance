<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="qless_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>qless_app</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    let processorPromise = null;
    let visionModelPromise = null;

    async function initModel() {
      if (!processorPromise) {
        console.log("Loading Transformers.js library dynamically...");
        // Import transformers library from jsdelivr
        const { AutoProcessor, CLIPVisionModelWithProjection } = await import('https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0');
        const modelId = 'Xenova/clip-vit-base-patch32';
        
        console.log("Downloading CLIP-ViT-B-32 Vision model (approx. 150MB)...");
        processorPromise = AutoProcessor.from_pretrained(modelId);
        visionModelPromise = CLIPVisionModelWithProjection.from_pretrained(modelId, {
          quantized: false,
          progress_callback: (data) => {
            if (data.status === 'progress') {
              console.log(`Downloading model file: ${data.file} (${data.progress.toFixed(1)}%)`);
            } else if (data.status === 'ready') {
              console.log(`Loaded model file: ${data.file}`);
            }
          }
        });
      }
      return Promise.all([processorPromise, visionModelPromise]);
    }

    window.getClipEmbedding = async function(base64DataUrl) {
      try {
        console.log("getClipEmbedding invoked.");
        const { RawImage } = await import('https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0');
        
        // Ensure models are initialized and cached
        const [processor, visionModel] = await initModel();
        
        console.log("Loading image into RawImage...");
        const image = await RawImage.fromURL(base64DataUrl);
        
        console.log("Preprocessing image...");
        const imageInputs = await processor(image);
        
        console.log("Running inference with CLIP-ViT-B-32...");
        const { image_embeds } = await visionModel(imageInputs);
        
        console.log("Inference successful. Extracting embedding vector...");
        const embeddingArray = Array.from(image_embeds.data);
        console.log("Embedding vector generated, length:", embeddingArray.length);
        
        return embeddingArray;
      } catch (err) {
        console.error("Error in getClipEmbedding JS:", err);
        throw err;
      }
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
